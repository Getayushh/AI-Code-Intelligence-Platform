<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CodeIntel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>
<div class="grid-glow"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">⚡</div>
    Code<span>Intel</span>
  </a>
  <div class="nav-links">
    <button class="nav-link" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>
</nav>

<!-- LOGIN SECTION -->
<div class="login-page">
  <div class="login-card" id="loginCard">

    <div class="login-logo">⚡</div>
    <div class="login-title" id="formTitle">Welcome back</div>
    <div class="login-sub" id="formSub">Sign in to your CodeIntel account</div>

    <!-- Error -->
    <div class="error-msg" id="authError"></div>

    <!-- Google Sign In -->
    <button class="btn btn-secondary" style="width:100%;margin-bottom:16px;justify-content:center;gap:12px" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or continue with email</div>

    <!-- Name (signup only) -->
    <div class="input-group" id="nameGroup" style="display:none">
      <label>Full name</label>
      <input type="text" class="input" id="nameInput" placeholder="Ayush Gupta">
    </div>

    <!-- Email -->
    <div class="input-group">
      <label>Email address</label>
      <input type="email" class="input" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>

    <!-- Password -->
    <div class="input-group">
      <label>Password</label>
      <input type="password" class="input" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <!-- Submit button -->
    <button class="btn btn-primary" style="width:100%;margin-top:4px" id="submitBtn" onclick="handleSubmit()">
      Sign In
    </button>

    <!-- Toggle login/signup -->
    <div class="login-footer" id="toggleText">
      Don't have an account? <span onclick="toggleMode()">Create one free</span>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Signing in...</div>
  <div class="loading-sub" id="loadingSub"></div>
</div>

<script type="module">
import { loginEmail, signupEmail, loginGoogle, onAuthChange } from './firebase.js';

// Redirect if already logged in
onAuthChange(user => {
  if (user) window.location.href = 'dashboard.html';
 });

let isSignup = false;

window.toggleMode = function() {
  isSignup = !isSignup;
  document.getElementById('formTitle').textContent  = isSignup ? 'Create account'    : 'Welcome back';
  document.getElementById('formSub').textContent    = isSignup ? 'Start analyzing your code for free' : 'Sign in to your CodeIntel account';
  document.getElementById('submitBtn').textContent  = isSignup ? 'Create Account'    : 'Sign In';
  document.getElementById('toggleText').innerHTML   = isSignup
    ? 'Already have an account? <span onclick="toggleMode()">Sign in</span>'
    : "Don't have an account? <span onclick='toggleMode()'>Create one free</span>";
  document.getElementById('nameGroup').style.display = isSignup ? 'flex' : 'none';
  hideErr();
};

window.handleSubmit = async function() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const name     = document.getElementById('nameInput').value.trim();

  if (!email)    return showErr('Please enter your email.');
  if (!password) return showErr('Please enter your password.');
  if (password.length < 6) return showErr('Password must be at least 6 characters.');
  if (isSignup && !name) return showErr('Please enter your name.');

  showLoad(isSignup ? 'Creating account...' : 'Signing in...');
  hideErr();

  try {
    if (isSignup) {
      await signupEmail(email, password, name);
    } else {
      await loginEmail(email, password);
    }
    // onAuthChange will redirect
  } catch (err) {
    hideLoad();
    showErr(friendlyError(err.code));
  }
};

window.handleGoogle = async function() {
  showLoad('Signing in with Google...');
  hideErr();
  try {
    await loginGoogle();
    // onAuthChange will redirect
  } catch (err) {
    hideLoad();
    if (err.code !== 'auth/popup-closed-by-user') {
      showErr(friendlyError(err.code));
    }
  }
};

// Allow Enter key
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.handleSubmit();
});

function showErr(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr() {
  document.getElementById('authError').style.display = 'none';
}
function showLoad(text) {
  document.getElementById('loadingOverlay').classList.add('show');
  document.querySelector('.loading-text').textContent = text;
}
function hideLoad() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function friendlyError(code) {
  const map = {
    'auth/user-not-found':      'No account found with this email.',
    'auth/wrong-password':      'Incorrect password. Please try again.',
    'auth/email-already-in-use':'An account with this email already exists.',
    'auth/invalid-email':       'Please enter a valid email address.',
    'auth/weak-password':       'Password must be at least 6 characters.',
    'auth/too-many-requests':   'Too many attempts. Please wait a moment.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/invalid-credential':  'Invalid email or password.',
  };
  return map[code] || 'Authentication failed. Please try again.';
}
</script>

</body>
</html>
