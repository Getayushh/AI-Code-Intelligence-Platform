<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>🚀 AI Code Intelligence Platform</h1>
    <p class="subtitle">Upload a ZIP of your Python codebase to detect clones, clusters &amp; quality insights</p>
</div>

<div class="container">

    <div class="upload-box">
        <!-- ✅ FIX: Restrict input to .zip files only -->
        <input type="file" id="fileInput" accept=".zip" />
        <button onclick="uploadFile()">⚡ Analyze Codebase</button>
        <p id="file-name-label" class="file-label">No file selected</p>
    </div>

    <div id="error-box" class="error-box" style="display:none;"></div>

    <div id="loading" style="display:none;" class="loading">
        <div class="spinner"></div>
        <span>Analyzing your codebase... this may take a moment</span>
    </div>

    <div id="dashboard" style="display:none;">

        <h2>📊 Summary</h2>
        <div id="summary"></div>

        <h2>🔍 Clone Detection</h2>
        <div id="clones"></div>

        <h2>📁 Clusters</h2>
        <div id="clusters"></div>

        <h2>💡 Insights &amp; Suggestions</h2>
        <div id="insights"></div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
